<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omega-Gen Forest | Sovereign Node</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00ff41; --dark: #050505; --fade: rgba(0, 255, 65, 0.2); }
        
        body { 
            background: var(--dark); 
            color: var(--neon); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }

        #map { 
            height: 40%; 
            width: 100%; 
            border-bottom: 2px solid var(--neon); 
            filter: invert(100%) hue-rotate(180deg) brightness(0.8); 
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: rgba(0, 255, 65, 0.05);
            border-bottom: 1px solid var(--neon);
            padding: 15px;
            text-align: center;
        }

        .stat-box { border-right: 1px solid var(--fade); }
        .stat-box:last-child { border-right: none; }

        .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: rgba(0, 255, 65, 0.6); }
        .val { font-size: 1.6rem; font-weight: bold; display: block; color: #fff; text-shadow: 0 0 10px var(--neon); }

        #console {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            background: #000;
            font-size: 0.85rem;
            line-height: 1.5;
            color: var(--neon);
        }

        .pulse { animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .loading-bar { width: 100%; height: 2px; background: var(--fade); position: relative; overflow: hidden; }
        .loading-bar::after { content: ''; position: absolute; left: -50%; width: 50%; height: 100%; background: var(--neon); animation: progress 2s infinite linear; }
        @keyframes progress { from { left: -50%; } to { left: 100%; } }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="loading-bar"></div>

    <div class="stats-grid">
        <div class="stat-box">
            <span class="label">Logical Cores</span>
            <span id="cores" class="val">0</span>
        </div>
        <div class="stat-box">
            <span class="label">Memory Pool</span>
            <span id="ram" class="val">0 GB</span>
        </div>
        <div class="stat-box">
            <span class="label">Metabolic Joules</span>
            <span id="joules" class="val">0</span>
        </div>
    </div>

    <div id="console">
        > [SYSTEM] INITIALIZING OMEGA-GEN SUBSTRATE...<br>
        > [SYSTEM] USER_ID: gairxx<br>
        > [SYSTEM] SENSING LOCAL HARDWARE...
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. CONFIGURATION
        const GH_USER = "gairxx";
        const REPO = "omega-gen-forest";
        const SOIL_URL = `https://raw.githubusercontent.com/${GH_USER}/${REPO}/main/soil/demand.json`;
        
        let totalJoules = 0;
        const log = (msg) => {
            const con = document.getElementById('console');
            con.innerHTML += `<br>> [${new Date().toLocaleTimeString()}] ${msg}`;
            con.scrollTop = con.scrollHeight;
        };

        // 2. INITIALIZE MAP
        const map = L.map('map', { zoomControl: false }).setView([32.46, -84.98], 3);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 3. HARDWARE TELEMETRY
        function senseHardware() {
            const cores = navigator.hardwareConcurrency || 4;
            const ram = navigator.deviceMemory || 4;
            document.getElementById('cores').innerText = cores;
            document.getElementById('ram').innerText = ram + " GB";
            log(`HARDWARE MATCH: ${cores} Cores detected.`);
        }

        // 4. GEOLOCATE NODE
        async function locateNode() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                L.circleMarker([d.latitude, d.longitude], {
                    color: '#00ff41',
                    radius: 12,
                    fillOpacity: 0.7,
                    weight: 2
                }).addTo(map).bindPopup(`Active Node: ${d.city}`).openPopup();
                map.setView([d.latitude, d.longitude], 6);
                log(`SUBSTRATE SYNC: ${d.city}, ${d.region_code} Node Online.`);
            } catch (e) {
                log("STEALTH MODE: Geolocation restricted.");
            }
        }

        // 5. METABOLIC COMPUTE (THE "WORK")
        async function metabolicPulse() {
            try {
                const res = await fetch(SOIL_URL + '?nocache=' + new Date().getTime());
                const task = await res.json();

                if (task.status === "UNMET") {
                    log(`NUTRIENT DETECTED: ${task.task_id}. METABOLIZING...`);
                    
                    const start = performance.now();
                    // SIMULATED COMPUTE: Sorting the payload
                    const sorted = [...task.payload].sort((a, b) => a - b);
                    const end = performance.now();
                    
                    totalJoules += task.reward_joules;
                    document.getElementById('joules').innerText = totalJoules;
                    
                    log(`TASK COMPLETE: Metabolized in ${(end - start).toFixed(4)}ms. Earned ${task.reward_joules} Joules.`);
                } else {
                    log("SOIL DORMANT. SCANNING FOR NEW NUTRIENTS...");
                }
            } catch (e) {
                log("ERROR SENSING SOIL. CHECKING CONNECTION...");
            }
        }

        // INITIALIZE
        window.onload = () => {
            senseHardware();
            locateNode();
            // Start the computing loop every 10 seconds
            setInterval(metabolicPulse, 10000);
        };
    </script>
</body>
</html>
